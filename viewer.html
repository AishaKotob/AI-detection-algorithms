<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surface Risk Analysis | 3D Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            overflow: hidden;
            color: white;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Glassmorphism UI */
        .overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            width: 320px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            display: block;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .legend {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .legend-bar {
            height: 8px;
            width: 100%;
            background: linear-gradient(to right, #00ff00, #ffff00, #ff0000);
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .legend-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            opacity: 0.7;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .controls-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--glass);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--border);
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="loading">Initializing System...</div>

    <div class="overlay">
        <h1>Surface Risk Analysis</h1>
        <p>Advanced predictive metrology for SLA / SLS 3D printing optimization.</p>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-value">High</span>
                <span class="stat-label">Risk Level</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">10.3%</span>
                <span class="stat-label">Zone Area</span>
            </div>
        </div>

        <div class="legend">
            <div class="legend-bar"></div>
            <div class="legend-labels">
                <span>Safe</span>
                <span>Warning</span>
                <span>Critical</span>
            </div>
        </div>
    </div>

    <div class="controls-hint">
        Left Click: Rotate | Right Click: Pan | Scroll: Zoom
    </div>

    <div id="canvas-container"></div>

    <!-- Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';

        let scene, camera, renderer, controls, currentModel;

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            // Fog for depth
            scene.fog = new THREE.Fog(0x0f172a, 20, 200);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 20, 20);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Grid / Ground
            const grid = new THREE.GridHelper(100, 50, 0x1e293b, 0x1e293b);
            grid.position.y = -10;
            scene.add(grid);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            window.addEventListener('resize', onWindowResize, false);

            // Drag and Drop Listeners
            window.addEventListener('dragover', (e) => e.preventDefault());
            window.addEventListener('drop', handleDrop);

            // Try loading default GLB if it exists, otherwise show hint
            loadDefaultModel();
            animate();
        }

        function handleDrop(e) {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                if (file.name.toLowerCase().endsWith('.stl')) {
                    processSTL(event.target.result);
                } else {
                    alert('Please drop an STL file for real-time analysis.');
                }
            };

            if (file.name.toLowerCase().endsWith('.stl')) {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('loading').innerText = 'Analyzing Geometry...';
                reader.readAsArrayBuffer(file);
            }
        }

        function processSTL(buffer) {
            const loader = new STLLoader();
            const geometry = loader.parse(buffer);

            // Calculate Normals
            geometry.computeVertexNormals();

            // Create Surface Risk Coloring
            const colors = [];
            const normals = geometry.attributes.normal.array;
            let highRiskCount = 0;
            const totalCount = normals.length / 3;

            for (let i = 0; i < normals.length; i += 3) {
                const nx = normals[i];
                const ny = normals[i + 1];
                const nz = Math.abs(normals[i + 2]); // Check verticality

                // Risk based on Angle to Z
                // nz approx 1 = vertical (Safe), nz approx 0 = horizontal (Critical)
                if (nz < 0.3) { // High Risk (Horizontal)
                    colors.push(1, 0, 0); // Red
                    highRiskCount++;
                } else if (nz < 0.7) { // Medium Risk
                    colors.push(1, 1, 0); // Yellow
                } else {
                    colors.push(0, 1, 0); // Green
                }
            }

            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                roughness: 0.4,
                metalness: 0.2
            });

            displayModel(new THREE.Mesh(geometry, material));

            // Update UI for real-time mode
            const highRiskPct = ((highRiskCount / totalCount) * 100).toFixed(1);
            const statValues = document.querySelectorAll('.stat-value');

            // Determine Risk Level text
            let riskLevel = "Low";
            if (highRiskPct > 10) riskLevel = "High";
            else if (highRiskPct > 2) riskLevel = "Medium";

            statValues[0].innerText = riskLevel;
            statValues[1].innerText = highRiskPct + "%";
            document.querySelector('p').innerText = "Real-time Slope Analysis (Angle-Based Only).";
        }

        function displayModel(mesh) {
            if (currentModel) scene.remove(currentModel);

            currentModel = mesh;
            currentModel.castShadow = true;
            currentModel.receiveShadow = true;

            // Center model
            const box = new THREE.Box3().setFromObject(currentModel);
            const center = box.getCenter(new THREE.Vector3());
            currentModel.position.sub(center);

            scene.add(currentModel);

            // Adjust camera
            const size = box.getSize(new THREE.Vector3()).length();
            camera.position.set(size, size, size);
            controls.update();

            document.getElementById('loading').style.display = 'none';
        }

        function loadDefaultModel() {
            const loader = new GLTFLoader();
            loader.load('./risk_model.glb', function (gltf) {
                displayModel(gltf.scene);
            }, undefined, function () {
                document.getElementById('loading').innerText = 'Drag & Drop an STL here to check';
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>

</html>
